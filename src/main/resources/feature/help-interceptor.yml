# Help Interceptor 配置文件
# 拦截 /help 指令并显示自定义帮助内容

# 是否启用模块
enabled: true

# 自定义帮助消息（支持颜色代码 &）
custom-help-message:
  - "&6=== 服务器帮助 ==="
  - "&e欢迎来到我们的服务器！"
  - "&e常用指令："
  - "&e  /spawn - 返回出生点"
  - "&e  /home - 返回家园"
  - "&e  /tpa <玩家> - 请求传送到玩家"
  - "&e  /msg <玩家> <消息> - 私聊玩家"
  - "&e如需更多帮助，请联系管理员。"
  - "&6==================="