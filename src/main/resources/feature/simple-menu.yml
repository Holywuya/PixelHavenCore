# =============================================================================
# TrMenu Lite 配置（菜单文件由 menus/*.yml 驱动）
# =============================================================================

# 功能开关
enabled: true

# 菜单文件所在目录（插件数据目录下）
menuFolder: "menus"

# 默认打开的菜单 ID（文件名，不含 .yml）
defaultMenu: "example"
