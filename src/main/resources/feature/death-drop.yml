# =============================================================================
# Death Drop — 危险世界死亡惩罚
# 玩家在指定世界死亡时，只有随机比例的物品会落地，
# 其余物品会保留在背包中（无需复活返还）。
# =============================================================================

# 模块开关
enabled: true

# 触发惩罚的世界名称列表。
# 填写服务端实际的世界文件夹名（区分大小写）。
# 原版默认名称：
#   末地  → world_the_end
#   下界  → world_nether
#   主世界 → world（默认不启用，一般无需惩罚）
worlds:
  - world_the_end
  - world_nether

# 物品掉落率范围（单位：%，有效值 0–100）
# 每次死亡时在 [min, max] 范围内随机取一个掉落率，
# 每件物品各自以此概率决定是否掉落到地面；
# 未选中的物品堆会保留在背包中。
#
# 示例：
#   min: 30, max: 30  → 始终 30% 物品落地（固定值）
#   min: 20, max: 60  → 每次死亡随机 20%~60% 物品落地
#   min: 0,  max: 0   → 所有物品保留在背包
#   min: 100,max: 100 → 与正常死亡相同，物品全部落地
dropChance:
  min: 20.0
  max: 60.0

# 拥有此权限的玩家不受惩罚影响（可用于管理员/VIP 豁免）。
# 留空（""）则对所有玩家生效。
exemptPermission: "phcore.deathdrop.bypass"

# 玩家死亡后收到的提示消息。
# 支持 & 颜色代码，以及以下占位符：
#   {dropped} — 实际掉落的物品堆数
#   {kept}    — 保留在背包中的物品堆数
#   {rate}    — 本次死亡使用的掉落率（整数 %）
# 留空（""）则不发送任何消息。
deathMessage: "&c你在危险维度死亡！掉落率 &e{rate}%&c，&e{dropped} &c堆物品落地，&e{kept} &c堆物品保留在背包。"
