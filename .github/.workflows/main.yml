# =============================================================================
# GitHub Actions CI/CD 配置文件
# =============================================================================

# 工作流名称
name: build

# 触发条件：当推送代码到 master 分支时
on:
  push:
    branches:
      - master

# 任务定义
jobs:
  # 构建任务
  build:
    # 运行在 Ubuntu 最新版本虚拟机上
    runs-on: ubuntu-latest

    # 步骤列表
    steps:
      # 1. 检出代码仓库
      - name: checkout repository
        uses: actions/checkout@v2

      # 2. 验证 Gradle Wrapper
      - name: validate gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      # 3. 设置 JDK 8.0 环境
      - name: setup jdk 8.0
        uses: actions/setup-java@v2
        with:
          # 使用 Adopt JDK 发行版
          distribution: adopt
          # JDK 版本
          java-version: 8.0

      # 4. 设置 Gradle Wrapper 为可执行
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      # 5. 第一次构建尝试
      - name: build
        id: build_1
        run: ./gradlew build

      # 6. 第二次构建尝试（如果第一次失败）
      - name: build (retry 1)
        id: build_2
        if: steps.build_1.outcome == 'failure'
        run: ./gradlew build

      # 7. 第三次构建尝试（如果第二次失败）
      - name: build (retry 2)
        id: build_3
        if: steps.build_2.outcome == 'failure'
        run: ./gradlew build

      # 8. 第四次构建尝试（如果第三次失败）
      - name: build (retry 3)
        id: build_4
        if: steps.build_3.outcome == 'failure'
        run: ./gradlew build

      # 9. 上传构建产物
      - name: capture build artifacts
        uses: actions/upload-artifact@v2
        with:
          # 产物名称
          name: Artifacts
          # 产物路径
          path: build/libs/
